server.port=8080

# PostgreSQL (pour Docker: utiliser host.docker.internal au lieu de localhost)
spring.datasource.url=jdbc:postgresql://localhost:5432/miniwireshark
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update

# CORS allowed origins (comma-separated)
# Frontend (5173,5174) + API/Swagger (8080,8081) - include both localhost and 127.0.0.1
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:8080,http://localhost:8081,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:8080,http://127.0.0.1:8081

# Socket.IO (port séparé pour les broadcasts en temps réel)
socketio.port=9092
